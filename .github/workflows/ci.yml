---
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

permissions: {}

jobs:
  go:
    name: ci/go
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...
      - name: Verify generated protocol documents
        run: scripts/check-generated.sh
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: v2.12.2
          args: --new-from-rev=origin/main

  typescript:
    name: ci/typescript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Type check
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Inspect package
        run: npm pack --dry-run

  conformance:
    name: ci/conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Build providers and conformance runner
        run: |
          npm --prefix sdk/typescript ci
          npm --prefix sdk/typescript run build
          mkdir -p .tmp/conformance
          go build -trimpath -o .tmp/conformance/mc-conformance ./cmd/mc-conformance
          go build -trimpath -o .tmp/conformance/mc-provider-example ./cmd/mc-provider-example
      - name: Run Go provider conformance
        run: >-
          .tmp/conformance/mc-conformance
          --provider ".tmp/conformance/mc-provider-example"
          --json .tmp/conformance/go.json
          --junit .tmp/conformance/go.xml
      - name: Run TypeScript provider conformance
        run: >-
          .tmp/conformance/mc-conformance
          --provider "node sdk/typescript/dist/examples/provider.js"
          --json .tmp/conformance/typescript.json
          --junit .tmp/conformance/typescript.xml

  release-snapshot:
    name: ci/release-snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          syft-version: v1.44.0
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          version: v2.16.0
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Verify snapshot contents
        shell: bash
        run: |
          shopt -s nullglob
          archives=(dist/mission-control-edge_*_linux_*.tar.gz dist/mission-control-edge_*_darwin_*.tar.gz)
          source_archives=(dist/mission-control-edge_*_source.tar.gz)
          sboms=(dist/*.tar.gz.spdx.json)
          [[ ${#archives[@]} -eq 4 ]]
          [[ ${#source_archives[@]} -eq 1 ]]
          [[ ${#sboms[@]} -eq 5 ]]
          [[ -s dist/checksums.txt ]]
          for archive in "${archives[@]}"; do
            listing=$(tar -tzf "$archive")
            grep -Eq '(^|/)mc-schema$' <<<"$listing"
            grep -Eq '(^|/)mc-provider-example$' <<<"$listing"
            grep -Eq '(^|/)mc-conformance$' <<<"$listing"
            grep -Eq '(^|/)LICENSE$' <<<"$listing"
            grep -Eq '(^|/)NOTICE$' <<<"$listing"
          done

  security:
    name: ci/security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install pinned security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/google/go-licenses/v2@v2.0.1
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Check vulnerabilities
        run: govulncheck ./...
      - name: Check dependency licenses
        run: >-
          go-licenses check --include_tests
          --disallowed_types=forbidden,restricted,reciprocal,unknown ./...
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: go
          build-mode: manual
      - name: Build for CodeQL
        run: go build ./...
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          category: /language:go
