---
name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  assets:
    name: Release SDK assets
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          syft-version: v1.44.0
      - name: Verify release tag
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          [[ "$GITHUB_REF_NAME" == v* ]]
          [[ -n "$version" && "$version" != "$GITHUB_REF_NAME" ]]
      - name: Publish release assets
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Attest checksummed release subjects
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
      - name: Attest checksums and SBOM documents
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: |
            dist/checksums.txt
            dist/*.spdx.json

  npm:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@gocodealone"
      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          syft-version: v1.44.0
      - name: Test and build package
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          npm ci
          npm test
          npm run lint
          npm run build
          version=$(node -p 'require("./package.json").version')
          [[ "v$version" == "$GITHUB_REF_NAME" ]]
      - name: Pack, hash, and catalog package
        id: pack
        working-directory: sdk/typescript
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p 'require("./package.json").version')
          tarball=$(npm pack --ignore-scripts --silent)
          [[ "$tarball" == "gocodealone-mission-control-provider-sdk-$version.tgz" ]]
          sha256sum "$tarball" >"$tarball.sha256"
          syft "$tarball" --output "spdx-json=$tarball.spdx.json"
          [[ -s "$tarball" && -s "$tarball.sha256" && -s "$tarball.spdx.json" ]]
          {
            printf 'version=%s\n' "$version"
            printf 'tarball=%s\n' "$tarball"
            printf 'sbom=%s\n' "$tarball.spdx.json"
          } >>"$GITHUB_OUTPUT"
      - name: Publish immutable package version
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          VERSION: ${{ steps.pack.outputs.version }}
        run: |
          package=@gocodealone/mission-control-provider-sdk
          registry=https://npm.pkg.github.com
          if npm view "$package@$VERSION" version --registry="$registry" >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/existing-package"
            existing=$(npm pack "$package@$VERSION" --registry="$registry" \
              --pack-destination "$RUNNER_TEMP/existing-package" --silent)
            built_digest=$(sha256sum "sdk/typescript/$TARBALL" | cut -d' ' -f1)
            existing_digest=$(sha256sum "$RUNNER_TEMP/existing-package/$existing" | cut -d' ' -f1)
            [[ "$built_digest" == "$existing_digest" ]]
          else
            npm publish "sdk/typescript/$TARBALL" --registry="$registry"
          fi
      - name: Attest npm package provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: sdk/typescript/${{ steps.pack.outputs.tarball }}
      - name: Attest npm package SPDX SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: sdk/typescript/${{ steps.pack.outputs.tarball }}
          sbom-path: sdk/typescript/${{ steps.pack.outputs.sbom }}
      - name: Verify published package identity and attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          VERSION: ${{ steps.pack.outputs.version }}
        run: |
          package_api=/orgs/GoCodeAlone/packages/npm/mission-control-provider-sdk
          for attempt in $(seq 1 12); do
            if gh api "$package_api" >"$RUNNER_TEMP/package.json" 2>/dev/null; then
              break
            fi
            printf 'waiting for package metadata (attempt %s)\n' "$attempt" >&2
            sleep 5
          done
          jq -e '.visibility == "public" and .repository.full_name == "GoCodeAlone/mission-control-edge"' \
            "$RUNNER_TEMP/package.json" >/dev/null
          gh api "$package_api/versions?per_page=100" >"$RUNNER_TEMP/versions.json"
          jq -e --arg version "$VERSION" \
            '[.[] | select(.name == $version)] | length == 1' \
            "$RUNNER_TEMP/versions.json" >/dev/null

          mkdir -p "$RUNNER_TEMP/published-package"
          published=$(npm pack "@gocodealone/mission-control-provider-sdk@$VERSION" \
            --registry=https://npm.pkg.github.com \
            --pack-destination "$RUNNER_TEMP/published-package" --silent)
          built_digest=$(sha256sum "sdk/typescript/$TARBALL" | cut -d' ' -f1)
          published_path="$RUNNER_TEMP/published-package/$published"
          published_digest=$(sha256sum "$published_path" | cut -d' ' -f1)
          [[ "$built_digest" == "$published_digest" ]]

          verify() {
            gh attestation verify "$published_path" \
              --repo GoCodeAlone/mission-control-edge \
              --signer-workflow GoCodeAlone/mission-control-edge/.github/workflows/release.yml \
              --source-ref "refs/tags/$GITHUB_REF_NAME" \
              "$@" --format json
          }
          for attempt in $(seq 1 12); do
            if verify >"$RUNNER_TEMP/provenance.json" 2>/dev/null && \
              verify --predicate-type https://spdx.dev/Document/v2.3 \
                >"$RUNNER_TEMP/sbom-attestation.json" 2>/dev/null; then
              break
            fi
            printf 'waiting for package attestations (attempt %s)\n' "$attempt" >&2
            sleep 5
          done
          jq -e --arg digest "$published_digest" \
            'any(.[].verificationResult.statement.subject[]?; .digest.sha256 == $digest)' \
            "$RUNNER_TEMP/provenance.json" >/dev/null
          jq -e --arg digest "$published_digest" \
            'any(.[].verificationResult.statement.subject[]?; .digest.sha256 == $digest) and
             any(.[].verificationResult.statement.predicate?; .spdxVersion == "SPDX-2.3")' \
            "$RUNNER_TEMP/sbom-attestation.json" >/dev/null
